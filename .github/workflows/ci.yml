name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive   # need dos_re/pynuked_opl3 (nested) for doc-links + OPL tests
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install test dependencies
        run: pip install pytest pytest-xdist
      - name: Boundary + syntax lint
        run: python tools/lint.py
      - name: Undefined-name guard
        run: python tools/check_undefined_names.py skyroads
      - name: Doc links resolve
        # Historical evidence is intentionally non-executable and may name
        # files removed by the 3.0 cleanup. Current agent-facing docs remain
        # link-checked.
        run: python dos_re/tools/check_doc_links.py . --exclude dos_re --exclude history
      - name: Test suite
        run: python -m pytest tests -q -n auto
      - name: End-to-end example (oracle -> hook -> verify -> snapshot)
        run: python dos_re/examples/minimal_adapter/example.py
      - name: Full-lifecycle example (frames, demos, both oracles, state mirror)
        run: python dos_re/examples/tiny_frame_game/walkthrough.py
