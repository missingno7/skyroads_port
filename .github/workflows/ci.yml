name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive   # need dos_re/pynuked_opl3 (nested) for doc-links + OPL tests
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install test dependencies
        run: pip install pytest pytest-xdist
      - name: Canonical repository gate
        # Public CI cannot carry the proprietary EXE needed by the retained
        # oracle differential. The same gate runs its asset-free subset here;
        # local release work runs it without --quick.
        run: python scripts/check_all.py --quick
      - name: Minimal execution, override, verification, and state example
        run: python dos_re/examples/minimal_adapter/example.py
      - name: ReplayArtifact oracle/candidate lifecycle example
        run: python dos_re/examples/tiny_frame_game/walkthrough.py
